name: Build And Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build app (onefile)
        shell: bash
        run: |
          python - << 'PY'
          import os
          import platform
          import subprocess
          import sys

          sep = ';' if os.name == 'nt' else ':'
          cmd = [
              sys.executable,
              '-m',
              'PyInstaller',
              '--noconfirm',
              '--clean',
              '--windowed',
              '--onefile',
              '--name',
              'FB-LLC-Calc',
              '--add-data',
              f'Power Inductors.csv{sep}.',
          ]

          if os.name == 'nt' and os.path.exists('assets/icon.ico'):
              cmd.extend(['--icon', 'assets/icon.ico'])

          cmd.append('llc_calc.py')
          subprocess.check_call(cmd)

          dist = 'dist'
          system = platform.system().lower()
          source = os.path.join(dist, 'FB-LLC-Calc.exe' if os.name == 'nt' else 'FB-LLC-Calc')
          ext = 'exe' if os.name == 'nt' else 'bin'
          target = os.path.join(dist, f'FB-LLC-Calc-{system}.{ext}')
          os.replace(source, target)
          print('Created', target)
          PY

      - name: Upload per-OS artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.os }}
          path: dist/FB-LLC-Calc-*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          RAW=$(tr -d ' \r\n' < VERSION.txt)
          VERSION=${RAW#VERSION=}
          if [ -z "$VERSION" ] || [ "$VERSION" = "$RAW" ]; then
            echo "VERSION file must be in the format VERSION=x.y.z"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches VERSION
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ steps.version.outputs.tag }}" ]; then
            echo "Tag (${GITHUB_REF_NAME}) does not match VERSION (v${{ steps.version.outputs.version }})."
            exit 1
          fi

      - name: Extract changelog section
        shell: bash
        run: |
          python - << 'PY'
          import pathlib
          import re

          raw = pathlib.Path('VERSION.txt').read_text(encoding='utf-8').strip()
          version = raw.split('=', 1)[1].strip() if '=' in raw else raw
          changelog = pathlib.Path('CHANGELOG.md').read_text(encoding='utf-8')
          pat = re.compile(rf"^## \[{re.escape(version)}\].*$", re.MULTILINE)
          m = pat.search(changelog)
          if not m:
              pathlib.Path('release_notes.md').write_text(
                  f"Release v{version}\n\nNo CHANGELOG section found for this version.",
                  encoding='utf-8',
              )
          else:
              start = m.start()
              next_m = re.search(r"^## \[", changelog[m.end():], re.MULTILINE)
              end = (m.end() + next_m.start()) if next_m else len(changelog)
              body = changelog[start:end].strip()
              pathlib.Path('release_notes.md').write_text(body + "\n", encoding='utf-8')
          PY

      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          name: FB LLC Calc v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: false
